const AnimatedNumber = ({ value, prefix = "", suffix = "", color = C.t1, duration = 1200 }) => {
  const [display, setDisplay] = useState("0");
  const numericVal = parseFloat(String(value).replace(/[^0-9.]/g, ""));
  const isNumeric = !isNaN(numericVal) && numericVal > 0;
  const hasDecimal = String(value).includes(".");
  useEffect(() => {
    if (!isNumeric) { setDisplay(value); return; }
    const startTime = performance.now();
    const animate = (now) => {
      const progress = Math.min((now - startTime) / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      const current = Math.round(eased * numericVal);
      setDisplay(hasDecimal ? (eased * numericVal).toFixed(1) : current.toLocaleString());
      if (progress < 1) requestAnimationFrame(animate);
      else setDisplay(hasDecimal ? numericVal.toFixed(1) : numericVal.toLocaleString());
    };
    requestAnimationFrame(animate);
  }, [value]);
  return <span style={{ fontSize: 32, fontWeight: 800, color, lineHeight: 1.1, letterSpacing: -1 }}>{prefix}{display}{suffix}</span>;
};

const MetricCard = ({ label, value, subtitle, color = C.t1 }) => {
  const match = String(value).match(/^([0-9,.]+)(.*)$/);
  const numPart = match ? match[1].replace(/,/g, "") : null;
  const suffixPart = match ? match[2] : "";
  const isAnimatable = numPart && !isNaN(parseFloat(numPart));
  return (
    <div style={{ ...S.card, padding: "22px 24px", flex: 1, minWidth: 160, borderLeft: `3px solid ${color === C.danger ? C.danger : C.teal}` }}>
      <div style={{ ...S.label, marginBottom: 6 }}>{label}</div>
      {isAnimatable ? <AnimatedNumber value={numPart} suffix={suffixPart} color={color} /> : <div style={{ fontSize: 32, fontWeight: 800, color, lineHeight: 1.1, letterSpacing: -1 }}>{value}</div>}
      {subtitle && <div style={{ fontSize: 12, color: C.t3, marginTop: 6 }}>{subtitle}</div>}
    </div>
  );
};
