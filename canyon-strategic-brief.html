const AnimatedNumber = ({ value, prefix = "", suffix = "", color = C.t1, duration = 1200, size = 36 }) => {
  const [display, setDisplay] = useState("0");
  const numericVal = parseFloat(String(value).replace(/[^0-9.]/g, ""));
  const isNumeric = !isNaN(numericVal) && numericVal > 0;
  const hasDecimal = String(value).includes(".");
  useEffect(() => {
    if (!isNumeric) { setDisplay(String(value)); return; }
    const startTime = performance.now();
    const animate = (now) => {
      const progress = Math.min((now - startTime) / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      const current = eased * numericVal;
      setDisplay(hasDecimal ? current.toFixed(2) : Math.round(current).toLocaleString());
      if (progress < 1) requestAnimationFrame(animate);
      else setDisplay(hasDecimal ? numericVal.toFixed(2) : numericVal.toLocaleString());
    };
    requestAnimationFrame(animate);
  }, [value]);
  return <span style={{ fontSize: size, fontWeight: 800, color, lineHeight: 1.1, letterSpacing: -1.2, fontFamily: FONT.body }}>{prefix}{display}{suffix}</span>;
};

const PositionCell = ({ rank, size = "sm" }) => {
  if (rank === "unranked" || rank == null) {
    return <span style={{
      display: "inline-block", background: C.danger, color: "#fff",
      fontFamily: FONT.mono, fontSize: size === "lg" ? 12 : 11, fontWeight: 700,
      padding: size === "lg" ? "5px 12px" : "3px 10px",
      borderRadius: 100, letterSpacing: 0.5
    }}>UNRANKED</span>;
  }
  const v = parseInt(rank);
  if (isNaN(v)) return <span style={{ color: C.t3, fontFamily: FONT.mono }}>--</span>;
  const color = v <= 3 ? C.success : v <= 10 ? C.warning : v <= 20 ? C.t3 : C.danger;
  return <span style={{
    fontFamily: FONT.mono,
    color,
    fontWeight: 700,
    fontSize: size === "lg" ? 16 : 13
  }}>#{v}</span>;
};

/* ========= MEGA MENU REVEAL (Tab 5 signature component) ========= */
const MegaMenuReveal = ({ caption }) => {
  const ref = useRef(null);
  const [activated, setActivated] = useState(false);
  const [reducedMotion, setReducedMotion] = useState(false);

  useEffect(() => {
    const mq = window.matchMedia("(prefers-reduced-motion: reduce)");
    setReducedMotion(mq.matches);
    if (mq.matches) {
      setActivated(true);
      return;
    }
    const obs = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting && e.intersectionRatio >= 0.4) {
          setActivated(true);
          obs.disconnect();
        }
      });
    }, { threshold: 0.4 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);

  const navTabs = ["Road","Gravel","E-Bikes","Mountain","City/Touring","Parts","Clothing"];

  const cardCommon = {
    padding: "12px 14px",
    borderRadius: 10,
    fontFamily: FONT.mono,
    fontSize: 11,
    fontWeight: 600,
    minWidth: 160,
    display: "flex", flexDirection: "column", gap: 4,
    transition: "all 900ms cubic-bezier(.16,1,.3,1)"
  };

  return (
    <div ref={ref} aria-label="Illustration: Canyon's 29er and 27.5 landing pages move from footer-only entry into the Mountain mega menu." style={{
      ...S.card,
      padding: "28px 32px 36px",
      position: "relative",
      overflow: "hidden",
      minHeight: 420
    }}>
      {/* Schematic nav header */}
      <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 20, paddingBottom: 16, borderBottom: `1px solid ${C.borderL}` }}>
        <BrandLogo brand="canyon" size={20} />
        <span style={{ fontFamily: FONT.mono, fontSize: 11, color: C.t3, letterSpacing: 1.5, textTransform: "uppercase" }}>canyon.com primary nav (schematic)</span>
      </div>

      {/* Tab row */}
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 16 }}>
        {navTabs.map((t) => {
          const isMountain = t === "Mountain";
          return (
            <div key={t} style={{
              padding: "8px 14px",
              borderRadius: 8,
              fontSize: 12,
              fontWeight: 600,
              background: isMountain ? C.tealDim2 : C.off,
              color: isMountain ? C.teal : C.t2,
              border: `1px solid ${isMountain ? C.teal : C.border}`,
              fontFamily: FONT.body
            }}>{t}</div>
          );
        })}
      </div>

      {/* Dropdown zone */}
      <div style={{
        position: "relative",
        border: `1px dashed ${C.border}`,
        borderRadius: 12,
        padding: 16,
        minHeight: 180,
        background: C.bg
      }}>
        <div style={{ fontFamily: FONT.mono, fontSize: 10, color: C.t3, letterSpacing: 1, textTransform: "uppercase", marginBottom: 12 }}>Mountain mega menu</div>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
          {["Featured models", "All mountain bikes", "Mountain accessories"].map((x) => (
            <div key={x} style={{
              padding: "10px 14px",
              background: C.white,
              border: `1px solid ${C.border}`,
              borderRadius: 10,
              fontSize: 12,
              color: C.t2
            }}>{x}</div>
          ))}

          {/* Surfaced pages: render inline but animate-lifted visually */}
          {["29er LP", "27.5 LP"].map((name, i) => {
            const isSurfaced = activated;
            return (
              <div key={name} style={{
                ...cardCommon,
                background: isSurfaced ? C.white : C.off,
                border: isSurfaced ? `2px solid ${C.canyonAccent}` : `2px dashed ${C.t3}`,
                color: isSurfaced ? C.t1 : C.t3,
                opacity: isSurfaced ? 1 : 0.5,
                transform: isSurfaced ? "translateY(0)" : "translateY(0)",
                animation: (activated && !reducedMotion) ? `surfacePulse 1600ms ${i * 150}ms ease-out` : "none"
              }}>
                <span style={{ fontSize: 13, fontWeight: 700, color: isSurfaced ? C.canyon : C.t2 }}>{name}</span>
                <span style={{ fontSize: 10, color: isSurfaced ? C.teal : C.t3 }}>
                  {isSurfaced ? "Surfaced in mega menu" : "FOOTER ONLY, 2,100 words, ranks #9"}
                </span>
              </div>
            );
          })}
        </div>
      </div>

      {/* Caption */}
      <div style={{
        marginTop: 20,
        fontFamily: FONT.mono,
        fontSize: 11,
        color: C.teal,
        fontWeight: 600,
        letterSpacing: 0.3,
        textAlign: "center",
        opacity: activated ? 1 : 0,
        transition: "opacity 600ms ease-out 800ms"

      </div>
    </div>
  );
};

const TabBar = ({ active, onSelect }) => {
  const buttonRefs = useRef([]);
  const onKeyDown = (e) => {
    const currentIdx = TABS.findIndex(t => t.id === active);
    if (currentIdx < 0) return;
    let nextIdx = null;
    if (e.key === "ArrowRight") nextIdx = (currentIdx + 1) % TABS.length;
    if (e.key === "ArrowLeft")  nextIdx = (currentIdx - 1 + TABS.length) % TABS.length;
    if (e.key === "Home") nextIdx = 0;
    if (e.key === "End")  nextIdx = TABS.length - 1;
    if (nextIdx != null) {
      e.preventDefault();
      onSelect(TABS[nextIdx].id);
      buttonRefs.current[nextIdx]?.focus();
    }
  };
  return (
    <div role="tablist" aria-label="Strategic brief sections" style={{
      display: "flex", borderBottom: `1px solid ${C.borderL}`,
      marginBottom: 28, overflowX: "auto", gap: 0
    }}>
      {TABS.map((tab, i) => {
        const isActive = tab.id === active;
        return (
          <button
            key={tab.id}
            ref={(el) => buttonRefs.current[i] = el}
            role="tab"
            id={`tab-${tab.id}`}
            aria-selected={isActive}
            aria-controls={`panel-${tab.id}`}
            tabIndex={isActive ? 0 : -1}
            onClick={() => onSelect(tab.id)}
            onKeyDown={onKeyDown}
            style={{
              padding: "14px 20px",
              border: "none",
              borderBottom: isActive ? `2px solid ${C.teal}` : "2px solid transparent",
              cursor: "pointer", fontSize: 13, fontWeight: 600,
              fontFamily: FONT.body,
              background: "transparent",
              color: isActive ? C.t1 : C.t3,
              whiteSpace: "nowrap",
              transition: "all 0.25s cubic-bezier(.16,1,.3,1)"
            }}>
            <span style={{ fontFamily: FONT.mono, fontSize: 11, color: C.teal, marginRight: 6, fontWeight: 600 }}>{tab.num}</span>
            {tab.label}
          </button>
        );
      })}
    </div>
  );
};

/* ========= APP ========= */
function CanyonBrief() {
  const getInitialTab = () => {
    if (typeof window === "undefined") return TABS[0].id;
    const h = (window.location.hash || "").replace("#", "");
    return TABS.find(t => t.id === h)?.id || TABS[0].id;
  };
  const [activeTab, setActiveTab] = useState(getInitialTab);

  useEffect(() => {
    if (typeof window === "undefined") return;
    if (window.location.hash !== `#${activeTab}`) {
      window.history.replaceState(null, "", `#${activeTab}`);
    }
  }, [activeTab]);

  useEffect(() => {
    const onHash = () => {
      const h = (window.location.hash || "").replace("#", "");
      if (TABS.find(t => t.id === h) && h !== activeTab) {
        setActiveTab(h);
      }
    };
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, [activeTab]);

  return (
    <div data-brief style={{
      fontFamily: FONT.body, background: C.bg, minHeight: "100vh",
      padding: "48px 32px", color: C.t1
    }}>
      <div style={{ maxWidth: 1200, margin: "0 auto" }}>
        <Header />
        <TabBar active={activeTab} onSelect={setActiveTab} />
        <TabPanel activeTab={activeTab} />
        <Footer />
      </div>
    </div>
  );
}
